- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible, teraform # string type
    tagsmap: ## below are map type
      name: ansible
      project: Devops
      component: catalogue
    tagslist:
      [
        { "key": "name", "value": "ansible" },
        { "key": "project", "value": "Devops" },
        { "key": "component", "value": "catalogue" },
      ]

  tasks:
    - name: greetins
      ansible.builtin.debug:
        msg: "Hi Sivakumar, {{ GREETINGS | default('Good Morning')}}"

    - name: convert string to list
      ansible.builtin.debug:
        msg: "{{ topics | split(',') }}" # here we are converting into list type

    - name: convert map to list
      ansible.builtin.debug:
        msg: "{{ tagsmap | dict2items }}"

    - name: convert list to map
      ansible.builtin.debug:
        msg: "{{ tagslist | items2dict }}"

    - name: read student yml
      ansible.builtin.set_fact: #setting the variable
        student_yml: "{{ lookup('file', 'studens.yaml') | from_yaml }}"

    - name: convert to json
      ansible.builtin.debug:
        msg: "{{ student_yml | to_nice_json }}"
